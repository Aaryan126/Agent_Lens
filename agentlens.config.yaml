policies:
  - name: auto-approve safe reads
    condition:
      tool_in:
        - fs.read
        - git.status
        - run_tests
    action: auto_execute

  - name: protect migrations and production
    condition:
      path_contains:
        - /migrations
        - /prod
    action: require_approval
    min_confidence: 0.0

  - name: block destructive database changes
    condition:
      tool_in:
        - db.query
      param_contains:
        query:
          - drop table
          - truncate table
    action: block_and_alert

  - name: low confidence gate
    condition:
      confidence_below: 0.75
      risk_not: low
    action: require_approval

